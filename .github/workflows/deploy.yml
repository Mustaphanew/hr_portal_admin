name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # إنتاج: base_url من Firebase Remote Config (مفتاح base_url)
      - name: Build web (Release - Production)
        run: >
          flutter build web --release
          --dart-define=FLAVOR=prod
          --dart-define=FCM_WEB_VAPID_KEY=BFG4aiBB8_NC4TEFZzm_d9_zC1XNLqw6mJaEiVpYAC93yCzR3sQ1-g0IkjgEEDIiV8QLxj1DOXAiGhp8kAUMkS0
          --base-href "/hr_portal_admin/"

      - name: Add 404.html for SPA routing
        run: cp build/web/index.html build/web/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
