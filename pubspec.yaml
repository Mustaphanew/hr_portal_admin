name: hr_portal_admin
description: "HR Portal Admin Management App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Network (Data Layer) ──
  dio: ^5.9.1
  flutter_secure_storage: ^10.0.0
  get_it: ^9.2.1
  equatable: ^2.0.8
  uuid: ^4.5.3

  # ── State Management ──
  flutter_riverpod: ^3.2.1

  # ── Routing ──
  go_router: ^17.1.0

  # ── Utilities ──
  intl: ^0.20.2
  jiffy: ^6.4.4
  smooth_page_indicator: ^2.0.1

  # ── Firebase ──
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1

  # ── Notifications ──
  awesome_notifications: ^0.11.0

  # ── Sharing & URLs ──
  share_plus: ^12.0.1
  url_launcher: ^6.3.2

  # ── SQLite ──
  sqlite3: ^3.1.1
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.5
  path: ^1.9.1

  # ── PWA ──
  pwa_install: ^0.0.6

  # ── HTTP & Auth ──
  http: ^1.6.0
  googleapis_auth: ^2.0.0

  # ── Images ──
  cached_network_image: ^3.4.1

  # ── Widgets ──
  flutter_slidable: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/i18n/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900
