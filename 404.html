<!DOCTYPE html>
<html>

<head>
  <base href="/hr_portal_admin/" />

  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="description" content="HR Portal Admin Management" />

  <!-- PWA meta -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="HR Admin" />

  <link rel="apple-touch-icon" href="icons/Icon-192.png" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="manifest" href="manifest.json" />

  <title>HR Portal Admin</title>

  <style id="splash-screen-style">
    html { height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      background-color: #0D2142;
    }
    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: 'Cairo', sans-serif;
      text-align: center;
    }
    .center h1 { font-size: 24px; font-weight: 800; }
    .center p { font-size: 14px; opacity: 0.6; }
  </style>

  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>

<body>
  <div id="splash" class="center">
    <div style="font-size: 48px;">🏛</div>
    <h1>لوحة إدارة المنظومة</h1>
    <p>جاري التحميل...</p>
  </div>

  <!-- Firebase Messaging Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async function () {
        try {
          const registration = await navigator.serviceWorker.register(
            "./firebase-messaging-sw.js",
            { scope: "./firebase-cloud-messaging-push-scope" }
          );
          console.log(
            "Firebase Messaging Service Worker registered:",
            registration.scope
          );
        } catch (error) {
          console.error(
            "Firebase Messaging Service Worker registration failed:",
            error
          );
        }
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>

  <!-- PWA install support -->
  <script>
    let deferredPrompt = null;

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    function promptInstall() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
    }

    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      if (typeof appInstalled === "function") {
        appInstalled();
      }
    });

    function getLaunchMode() {
      const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches;

      if (deferredPrompt && typeof hasPrompt === "function") {
        hasPrompt();
      }

      if (document.referrer.startsWith("android-app://")) {
        if (typeof appLaunchedAsTWA === "function") {
          appLaunchedAsTWA();
        }
      } else if (navigator.standalone || isStandalone) {
        if (typeof appLaunchedAsPWA === "function") {
          appLaunchedAsPWA();
        }
      } else {
        if (typeof appLaunchedInBrowser === "function") {
          appLaunchedInBrowser();
        }
      }
    }
  </script>
</body>

</html>
